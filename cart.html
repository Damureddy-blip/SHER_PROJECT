<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Review and manage your Sher's Home Food cart before checkout." />
    <title>Cart | Sher's Home Food</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="page-loader" id="pageLoader">
      <div class="spinner"></div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
          <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=120&q=80" alt="Sher's Home Food logo" class="brand-logo" loading="lazy" />
          <span class="fw-bold text-dark">Sher's Home Food</span>
        </a>
      </div>
    </nav>

    <main class="py-5">
      <div class="container">
        <h2 class="fw-bold mb-4">Your Cart</h2>
        <div class="row g-4">
          <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
              <div class="card-body p-4">
                <div id="cartItems"></div>
              </div>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="card border-0 shadow-sm">
              <div class="card-body p-4">
                <h5 class="fw-bold">Order Summary</h5>
                <div class="d-flex justify-content-between mt-3"><span>Subtotal</span><span id="subtotal">₹0</span></div>
                <div class="d-flex justify-content-between mt-2"><span>GST</span><span id="gst">₹0</span></div>
                <div class="d-flex justify-content-between mt-2"><span>Shipping</span><span id="shipping">₹0</span></div>
                <hr />
                <div class="d-flex justify-content-between fw-bold"><span>Grand Total</span><span id="grandTotal">₹0</span></div>
                <div class="input-group mt-4">
                  <input type="text" class="form-control" placeholder="Coupon code" />
                  <button class="btn btn-outline-primary">Apply</button>
                </div>
                <a href="checkout.html" class="btn btn-primary w-100 mt-4">Proceed to Checkout</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-dark text-white py-5 mt-5">
      <div class="container">
        <div class="row g-4">
          <div class="col-md-6">
            <h5 class="fw-bold mb-3">Sher's Home Food</h5>
            <p class="text-white-50 mb-0">Freshly prepared pantry essentials for your home.</p>
          </div>
          <div class="col-md-6">
            <h6 class="fw-bold mb-3">Need help?</h6>
            <ul class="list-unstyled text-white-50">
              <li><i class="bi bi-envelope me-2"></i>lovableboy09@gmail.com</li>
              <li><i class="bi bi-telephone me-2"></i>+91 7995272949</li>
            </ul>
          </div>
        </div>
        <div class="border-top mt-4 pt-4 text-white-50">
          <small>© <span id="year"></span> Sher's Home Food. All rights reserved.</small>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
